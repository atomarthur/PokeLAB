<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" type="text/css" href="estilo.css">
    <script type="text/javascript" src="pesquisa.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Monofett&display=swap" rel="stylesheet">
    
</head>

<body>

    <header class="header">

        <div class="logo">
            <img src="images/pokeball.png" alt="logo">
            <span>PokeLAB</span>
        </div>

        <nav class="nav">
            <a href="index.html">
                Pokédex
            </a>
        </nav>

    </header>

    <div class="titulo">
        <img src="images/International_Pokémon_logo.svg.png" alt="Pokémon">
    </div>
    
    <div class="container">

    <div class="lado-esquerdo">

        <div class="nome">BULBASAUR</div>

        <div class="foto">
            <img id="imagem"
            src="">
        </div>

        <ul class="tipos">
            <li id="tipo1"></li>
            <li id="tipo2"></li>
        </ul>
    </div>


    <div class="lado-direito">

        <div class="numero-container">
            <div id="index">1</div>
        </div>

        <div class="info">
            <div class="medida">
                <span class="label">HEIGHT</span>
                <span id="height"></span>
            </div>

            <div class="medida">
                <span class="label">WEIGHT</span>
                <span id="weight"></span>
            </div>
        </div>

        <!--
        
        <div class="habilidades">
            <h3>Habilidades</h3>
            <ul id="listaHabilidades">
                <li>Overgrow</li>
                <li>Chlorophyll</li>
            </ul>
        </div>
        
        -->  

        <div class="status">

            <div class="stat">
                <span>HP</span>
                <div class="barra"><div id="hp"></div></div>
            </div>

            <div class="stat">
                <span>ATK</span>
                <div class="barra"><div id="attack"></div></div>
            </div>

            <div class="stat">
                <span>DEF</span>
                <div class="barra"><div id="defense"></div></div>
            </div>

            <div class="stat">
                <span>SPA</span>
                <div class="barra"><div id="special-attack"></div></div>
            </div>

            <div class="stat">
                <span>SPD</span>
                <div class="barra"><div id="special-defense"></div></div>
            </div>

            <div class="stat">
                <span>SPE</span>
                <div class="barra"><div id="speed"></div></div>
            </div>

        </div>

    </div>

</div>
        
    <form class="pesquisa">
        <input type="text" placeholder="Número do Pokémon" id='num'>
        <input type="submit" value="Pesquisar" onclick="mostrarPokemon(document.getElementById('num').value, event)">
    </form>

</body>
</html>
